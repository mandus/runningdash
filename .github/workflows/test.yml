name: Run Tests

on:
  pull_request:
    branches: [ main, feature/* ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Go unit tests
        run: go test ./... -v

      - name: Build strava_goal
        run: go build -o strava_goal ./cmd/strava_goal

      - name: Run Goal integration tests
        run: ./strava_goal extensions/http/test_http.goal
